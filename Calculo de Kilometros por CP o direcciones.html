<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Rutas Múltiples - España</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .inputs { display: flex; flex-direction: column; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; grid-column: 1 / span 2; text-align: center; }
        label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 120px; resize: vertical; }
        button { padding: 15px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:hover { background: #0056b3; }
        
        .results-container { overflow-y: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; }
        
        #map { width: 100%; max-width: 800px; height: 400px; margin-top: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .loading { color: #007bff; font-weight: bold; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cálculo de Distancias por Ruta (España)</h2>
    
    <div class="inputs">
        <label>Dirección u Origen (CP o Calle, Ciudad):</label>
        <input type="text" id="origen" placeholder="Ej: Calle Mayor 1, Madrid o 28013" value="Madrid">

        <label>Direcciones o CPs de Destino (uno por línea):</label>
        <textarea id="destinos" placeholder="28001&#10;Calle Pelayo 5, Barcelona&#10;Sevilla&#10;Valencia"></textarea>
        
        <button onclick="procesarTodo()">Calcular Todas las Rutas</button>
        <div id="status" class="loading"></div>
    </div>

    <div class="results-container">
        <table>
            <thead>
                <tr>
                    <th>Destino</th>
                    <th>KM</th>
                    <th>Tiempo</th>
                </tr>
            </thead>
            <tbody id="tabla-resultados">
                <!-- Se llenará dinámicamente -->
            </tbody>
        </table>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([40.4167, -3.7037], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let capasRutas = L.featureGroup().addTo(map);

    // Función para convertir Texto (dirección o CP) a Coordenadas
    async function geocodificar(query) {
        // Añadimos ", España" para forzar que busque aquí
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", España")}&limit=1`;
        const response = await fetch(url, { headers: { 'User-Agent': 'MiCalculadorDistancias/1.0' } });
        const data = await response.json();
        if (data.length === 0) throw new Error("No encontrado");
        return {
            lat: parseFloat(data[0].lat),
            lon: parseFloat(data[0].lon),
            display_name: data[0].display_name
        };
    }

    // Función para calcular ruta entre dos puntos
    async function obtenerRuta(p1, p2) {
        const url = `https://router.project-osrm.org/route/v1/driving/${p1.lon},${p1.lat};${p2.lon},${p2.lat}?overview=full&geometries=geojson`;
        const response = await fetch(url);
        const data = await response.json();
        if (!data.routes || data.routes.length === 0) throw new Error("Sin ruta");
        return data.routes[0];
    }

    async function procesarTodo() {
        const origenTexto = document.getElementById('origen').value.trim();
        const destinosTexto = document.getElementById('destinos').value.trim();
        const tabla = document.getElementById('tabla-resultados');
        const status = document.getElementById('status');

        if (!origenTexto || !destinosTexto) {
            alert("Por favor rellena origen y destinos");
            return;
        }

        const listaDestinos = destinosTexto.split('\n').filter(linea => linea.trim() !== "");
        tabla.innerHTML = "";
        capasRutas.clearLayers();
        status.innerText = "Iniciando proceso...";

        try {
            // 1. Geocodificar Origen
            status.innerText = "Buscando origen...";
            const coordOrigen = await geocodificar(origenTexto);
            L.marker([coordOrigen.lat, coordOrigen.lon]).addTo(capasRutas).bindPopup("ORIGEN: " + origenTexto);

            // 2. Procesar cada destino en un bucle
            for (let i = 0; i < listaDestinos.length; i++) {
                const textoDestino = listaDestinos[i].trim();
                status.innerText = `Procesando destino ${i + 1} de ${listaDestinos.length}: ${textoDestino}`;
                
                try {
                    // Geocodificar destino
                    const coordDestino = await geocodificar(textoDestino);
                    
                    // Esperar un poco para no saturar la API gratuita (Nomimatim pide 1 seg entre peticiones)
                    await new Promise(r => setTimeout(r, 1000));

                    // Calcular ruta
                    const ruta = await obtenerRuta(coordOrigen, coordDestino);
                    const kms = (ruta.distance / 1000).toFixed(1);
                    const mins = Math.round(ruta.duration / 60);

                    // Añadir a la tabla
                    const fila = `<tr>
                        <td>${textoDestino}</td>
                        <td><strong>${kms} km</strong></td>
                        <td>${mins} min</td>
                    </tr>`;
                    tabla.innerHTML += fila;

                    // Dibujar en el mapa
                    const geojson = L.geoJSON(ruta.geometry, {
                        style: { color: i === 0 ? 'blue' : 'gray', weight: 3, opacity: 0.6 }
                    }).addTo(capasRutas);

                } catch (err) {
                    tabla.innerHTML += `<tr><td>${textoDestino}</td><td colspan="2" style="color:red">No encontrado o sin ruta</td></tr>`;
                }
            }

            status.innerText = "¡Proceso finalizado!";
            map.fitBounds(capasRutas.getBounds(), { padding: [20, 20] });

        } catch (error) {
            status.innerText = "Error en el origen: " + error.message;
        }
    }
</script>

</body>
</html>

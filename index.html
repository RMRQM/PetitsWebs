<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador Logístico España</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #d32f2f; --secondary: #1976d2; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        h2 { grid-column: 1 / span 2; text-align: center; margin: 0 0 10px 0; color: #333; }
        
        /* Autocomplete styles */
        .autocomplete-container { position: relative; }
        #sugerencias { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; z-index: 2000; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; display: none; }
        .sugerencia-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .sugerencia-item:hover { background: #f0f0f0; }

        label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        .opciones-ruta { display: flex; gap: 15px; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .opciones-ruta label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }

        button { padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #115293; }
        
        .results-container { overflow-y: auto; max-height: 500px; border: 1px solid #eee; border-radius: 8px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; position: sticky; top: 0; }
        
        #map { width: 100%; max-width: 900px; height: 450px; margin-top: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .loading { color: var(--secondary); font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
        
        /* Icono rojo para los destinos */
        .red-icon { filter: hue-rotate(150deg) brightness(0.8); }
    </style>
</head>
<body>

<div class="container">
    <h2>Cálculo de Rutas por Dirección</h2>
    
    <div class="inputs">
        <label>Dirección de Origen:</label>
        <div class="autocomplete-container">
            <input type="text" id="origen" placeholder="Escribe calle, número y ciudad..." autocomplete="off">
            <div id="sugerencias"></div>
        </div>

        <div class="opciones-ruta">
            <label><input type="radio" name="tipoRuta" value="1" checked> Sólo ida</label>
            <label><input type="radio" name="tipoRuta" value="2"> Ida y vuelta</label>
        </div>

        <label>Destinos (uno por línea):</label>
        <textarea id="destinos" placeholder="28001&#10;Calle Pelayo 5, Barcelona&#10;Sevilla"></textarea>
        
        <button onclick="procesarTodo()">Calcular Rutas</button>
        <div id="status" class="loading"></div>
    </div>

    <div class="results-container">
        <table>
            <thead>
                <tr>
                    <th>Destino</th>
                    <th>KM</th>
                    <th>Tiempo</th>
                </tr>
            </thead>
            <tbody id="tabla-resultados"></tbody>
        </table>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- CONFIGURACIÓN DEL MAPA ---
    const map = L.map('map').setView([40.4167, -3.7037], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let capasRutas = L.featureGroup().addTo(map);
    let timeoutBusqueda;

    // --- AUTOCOMPLETADO ---
    const inputOrigen = document.getElementById('origen');
    const sugerenciasDiv = document.getElementById('sugerencias');

    inputOrigen.addEventListener('input', () => {
        clearTimeout(timeoutBusqueda);
        const query = inputOrigen.value;
        if (query.length < 4) { sugerenciasDiv.style.display = 'none'; return; }

        timeoutBusqueda = setTimeout(async () => {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", España")}&limit=5`;
            try {
                const response = await fetch(url, { headers: { 'User-Agent': 'CalculadorDist' } });
                const data = await response.json();
                
                sugerenciasDiv.innerHTML = '';
                if (data.length > 0) {
                    sugerenciasDiv.style.display = 'block';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'sugerencia-item';
                        div.innerText = item.display_name;
                        div.onclick = () => {
                            inputOrigen.value = item.display_name;
                            inputOrigen.dataset.lat = item.lat;
                            inputOrigen.dataset.lon = item.lon;
                            sugerenciasDiv.style.display = 'none';
                        };
                        sugerenciasDiv.appendChild(div);
                    });
                }
            } catch (e) {}
        }, 500);
    });

    // --- LÓGICA DE CÁLCULO ---

    async function geocodificar(query) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", España")}&limit=1`;
        const response = await fetch(url, { headers: { 'User-Agent': 'CalculadorDist' } });
        const data = await response.json();
        if (data.length === 0) throw new Error("No encontrado");
        return { lat: data[0].lat, lon: data[0].lon };
    }

    async function obtenerRuta(p1, p2) {
        const url = `https://router.project-osrm.org/route/v1/driving/${p1.lon},${p1.lat};${p2.lon},${p2.lat}?overview=full&geometries=geojson`;
        const response = await fetch(url);
        const data = await response.json();
        return data.routes[0];
    }

    async function procesarTodo() {
        const origenTexto = inputOrigen.value;
        const destinosTexto = document.getElementById('destinos').value.trim();
        const multiplicador = parseInt(document.querySelector('input[name="tipoRuta"]:checked').value);
        const tabla = document.getElementById('tabla-resultados');
        const status = document.getElementById('status');

        if (!origenTexto || !destinosTexto) { alert("Completa los campos"); return; }

        const listaDestinos = destinosTexto.split('\n').filter(l => l.trim() !== "");
        tabla.innerHTML = "";
        capasRutas.clearLayers();
        
        try {
            status.innerText = "Obteniendo origen...";
            // Si no seleccionó del autocompletado, geocodificamos manualmente
            let coordOrigen;
            if (inputOrigen.dataset.lat) {
                coordOrigen = { lat: inputOrigen.dataset.lat, lon: inputOrigen.dataset.lon };
            } else {
                coordOrigen = await geocodificar(origenTexto);
            }

            L.marker([coordOrigen.lat, coordOrigen.lon]).addTo(capasRutas).bindPopup("ORIGEN");

            for (let i = 0; i < listaDestinos.length; i++) {
                const dTexto = listaDestinos[i].trim();
                status.innerText = `Calculando ${i+1} de ${listaDestinos.length}...`;
                
                try {
                    await new Promise(r => setTimeout(r, 1000)); // Respetar límites API
                    const coordDestino = await geocodificar(dTexto);
                    const ruta = await obtenerRuta(coordOrigen, coordDestino);
                    
                    const kms = ((ruta.distance / 1000) * multiplicador).toFixed(2);
                    const minsTotal = (ruta.duration / 60) * multiplicador;
                    const horas = Math.floor(minsTotal / 60);
                    const mins = Math.round(minsTotal % 60);
                    const tiempoStr = horas > 0 ? `${horas}h ${mins}min` : `${mins}min`;

                    // Añadir fila a tabla
                    tabla.innerHTML += `<tr><td>${dTexto}</td><td><strong>${kms} km</strong></td><td>${tiempoStr}</td></tr>`;

                    // Añadir marcador ROJO (POI)
                    const redMarker = L.marker([coordDestino.lat, coordDestino.lon]).addTo(capasRutas);
                    redMarker._icon.classList.add("red-icon");
                    redMarker.bindPopup(`DESTINO: ${dTexto}<br>${kms} km`);

                    // Dibujar línea
                    L.geoJSON(ruta.geometry, { style: { color: '#333', weight: 3, opacity: 0.5 } }).addTo(capasRutas);

                } catch (e) {
                    tabla.innerHTML += `<tr><td>${dTexto}</td><td colspan="2" style="color:red">No encontrado</td></tr>`;
                }
            }
            status.innerText = "Finalizado.";
            map.fitBounds(capasRutas.getBounds(), { padding: [50, 50] });

        } catch (error) {
            status.innerText = "Error: " + error.message;
        }
    }
</script>

</body>
</html>

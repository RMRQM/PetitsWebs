<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fluid Navigator - Calculador de Rutas España</title>
    
    <!-- Estilos -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#005dac",
                        "secondary": "#2b5bb5",
                        "surface": "#f9f9fe",
                        "background": "#f9f9fe",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .red-icon { filter: hue-rotate(150deg) brightness(0.8); }
        .results-scroll { max-height: 300px; overflow-y: auto; }
        #sugerencias { z-index: 2000; }
    </style>
</head>

<body class="bg-background text-on-surface">

<!-- Header -->
<header class="flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50 bg-white/80 backdrop-blur-xl shadow-sm">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-black text-blue-900 tracking-tight">Fluid Navigator</span>
    </div>
    <div class="flex items-center gap-4 text-slate-500 text-sm font-medium">
        <span>Logística de Precisión • España</span>
    </div>
</header>

<main class="flex min-h-screen pt-20">
    <!-- Sidebar Izquierdo (Formulario y Resultados) -->
    <aside class="w-full md:w-[480px] h-[calc(100vh-80px)] overflow-y-auto p-6 flex flex-col gap-6 bg-white border-r border-slate-100">
        
        <!-- Tarjeta de Planificación -->
        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 shadow-sm">
            <header class="mb-6">
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Planificador de Rutas</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Cálculo exacto por carretera</p>
            </header>

            <div class="space-y-4">
                <!-- Origen con Autocompletado -->
                <div class="relative">
                    <label class="text-primary font-bold text-[10px] uppercase tracking-widest ml-1">Punto de Origen</label>
                    <div class="flex items-center bg-white border border-slate-200 rounded-xl p-3 focus-within:ring-2 focus-within:ring-primary/20 transition-all">
                        <span class="material-symbols-outlined text-primary mr-2">location_on</span>
                        <input id="origen" class="bg-transparent border-none focus:ring-0 w-full text-sm font-medium" placeholder="Calle o CP de salida..." type="text" autocomplete="off"/>
                    </div>
                    <!-- Sugerencias -->
                    <div id="sugerencias" class="absolute left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-xl hidden"></div>
                </div>

                <!-- Opciones -->
                <div class="flex items-center gap-4 py-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="radio" name="tipoRuta" value="1" checked class="text-primary focus:ring-primary">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-primary transition-colors">Sólo ida</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="radio" name="tipoRuta" value="2" class="text-primary focus:ring-primary">
                        <span class="text-xs font-bold text-slate-600 group-hover:text-primary transition-colors">Ida y vuelta</span>
                    </label>
                </div>

                <!-- Destinos -->
                <div>
                    <label class="text-primary font-bold text-[10px] uppercase tracking-widest ml-1">Destinos (uno por línea)</label>
                    <textarea id="destinos" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm font-medium focus:ring-primary/20 h-28" placeholder="Ejemplo:&#10;28001&#10;Calle Pelayo 5, Barcelona&#10;Sevilla"></textarea>
                </div>

                <button onclick="procesarTodo()" class="w-full py-4 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-bold text-sm shadow-lg hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">route</span>
                    CALCULAR RUTAS
                </button>
            </div>
        </div>

        <!-- Tarjeta de Resultados -->
        <div id="card-resultados" class="bg-white border border-slate-100 rounded-2xl p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-slate-900 uppercase text-[10px] tracking-widest">Resultados Optimizados</h3>
                <button onclick="exportarCSV()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-primary/20 bg-primary/5 text-primary hover:bg-primary/10 transition-all text-[10px] font-black uppercase">
                    <span class="material-symbols-outlined text-sm">table_chart</span> Exportar CSV
                </button>
            </div>

            <div class="results-scroll">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-50">
                            <th class="pb-2 font-bold uppercase tracking-tighter text-[9px]">Destino</th>
                            <th class="pb-2 font-bold uppercase tracking-tighter text-[9px]">Distancia</th>
                            <th class="pb-2 font-bold uppercase tracking-tighter text-[9px]">Tiempo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-resultados" class="text-slate-700">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
            
            <div id="loader" class="hidden pt-4 text-center">
                <div class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-primary border-t-transparent"></div>
                <span class="ml-2 text-[10px] font-bold text-primary uppercase">Procesando...</span>
            </div>
        </div>

        <div class="mt-auto opacity-30 text-[9px] font-black tracking-widest uppercase text-center">
            Fluid Navigator Core v4.2 • Geodata OpenStreetMap
        </div>
    </aside>

    <!-- Sección de Mapa (Derecha) -->
    <section class="flex-1 h-[calc(100vh-80px)] relative">
        <div id="map"></div>
        
        <!-- Overlay del Mapa (Info Flotante) -->
        <div class="absolute bottom-6 left-6 z-[1000] pointer-events-none">
            <div class="bg-white/90 backdrop-blur shadow-2xl p-4 rounded-2xl flex items-center gap-4 border border-white">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white shadow-lg">
                    <span class="material-symbols-outlined">navigation</span>
                </div>
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Estado del Sistema</p>
                    <p id="system-status" class="text-xs font-bold text-slate-900 italic">Listo para navegar</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- INICIALIZACIÓN ---
    const map = L.map('map', { zoomControl: false }).setView([40.4167, -3.7037], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    let capasRutas = L.featureGroup().addTo(map);
    let datosParaExportar = [];
    let timeoutBusqueda;

    // --- AUTOCOMPLETADO ---
    const inputOrigen = document.getElementById('origen');
    const sugerenciasDiv = document.getElementById('sugerencias');

    inputOrigen.addEventListener('input', () => {
        clearTimeout(timeoutBusqueda);
        const query = inputOrigen.value;
        if (query.length < 3) { sugerenciasDiv.classList.add('hidden'); return; }

        timeoutBusqueda = setTimeout(async () => {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", España")}&limit=5`;
            try {
                const response = await fetch(url, { headers: { 'User-Agent': 'FluidNav' } });
                const data = await response.json();
                
                sugerenciasDiv.innerHTML = '';
                if (data.length > 0) {
                    sugerenciasDiv.classList.remove('hidden');
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'p-3 hover:bg-slate-50 cursor-pointer text-xs border-b border-slate-100 last:border-none font-medium';
                        div.innerText = item.display_name;
                        div.onclick = () => {
                            inputOrigen.value = item.display_name;
                            inputOrigen.dataset.lat = item.lat;
                            inputOrigen.dataset.lon = item.lon;
                            sugerenciasDiv.classList.add('hidden');
                        };
                        sugerenciasDiv.appendChild(div);
                    });
                }
            } catch (e) {}
        }, 400);
    });

    // --- LÓGICA CORE ---
    async function geocodificar(query) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", España")}&limit=1`;
        const response = await fetch(url, { headers: { 'User-Agent': 'FluidNav' } });
        const data = await response.json();
        if (data.length === 0) throw new Error("No encontrado");
        return { lat: data[0].lat, lon: data[0].lon, name: data[0].display_name };
    }

    async function obtenerRuta(p1, p2) {
        const url = `https://router.project-osrm.org/route/v1/driving/${p1.lon},${p1.lat};${p2.lon},${p2.lat}?overview=full&geometries=geojson`;
        const response = await fetch(url);
        const data = await response.json();
        return data.routes[0];
    }

    async function procesarTodo() {
        const origenTexto = inputOrigen.value;
        const destinosTexto = document.getElementById('destinos').value.trim();
        const multiplicador = parseInt(document.querySelector('input[name="tipoRuta"]:checked').value);
        const tabla = document.getElementById('tabla-resultados');
        const cardResultados = document.getElementById('card-resultados');
        const loader = document.getElementById('loader');
        const systemStatus = document.getElementById('system-status');

        if (!origenTexto || !destinosTexto) return alert("Por favor, introduce origen y al menos un destino.");

        listaDestinos = destinosTexto.split('\n').filter(l => l.trim() !== "");
        tabla.innerHTML = "";
        datosParaExportar = [];
        capasRutas.clearLayers();
        cardResultados.classList.remove('hidden');
        loader.classList.remove('hidden');

        try {
            systemStatus.innerText = "Localizando origen...";
            let coordOrigen;
            if (inputOrigen.dataset.lat) {
                coordOrigen = { lat: inputOrigen.dataset.lat, lon: inputOrigen.dataset.lon };
            } else {
                coordOrigen = await geocodificar(origenTexto);
            }

            L.marker([coordOrigen.lat, coordOrigen.lon]).addTo(capasRutas).bindPopup("ORIGEN: " + origenTexto);

            for (let i = 0; i < listaDestinos.length; i++) {
                const dTexto = listaDestinos[i].trim();
                systemStatus.innerText = `Calculando destino ${i+1}/${listaDestinos.length}...`;
                
                try {
                    await new Promise(r => setTimeout(r, 800)); // Delay para API gratuita
                    const coordDestino = await geocodificar(dTexto);
                    const ruta = await obtenerRuta(coordOrigen, coordDestino);
                    
                    const kms = ((ruta.distance / 1000) * multiplicador).toFixed(2);
                    const minsTotal = (ruta.duration / 60) * multiplicador;
                    const horas = Math.floor(minsTotal / 60);
                    const mins = Math.round(minsTotal % 60);
                    const tiempoStr = horas > 0 ? `${horas}h ${mins}m` : `${mins}m`;

                    // Tabla UX
                    tabla.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                            <td class="py-3 pr-2 font-medium">${dTexto}</td>
                            <td class="py-3 font-black text-primary">${kms} km</td>
                            <td class="py-3 text-slate-400 font-bold">${tiempoStr}</td>
                        </tr>
                    `;

                    // Guardar para CSV
                    datosParaExportar.push({ Destino: dTexto, KM: kms, Tiempo: tiempoStr, Tipo: multiplicador === 2 ? 'Ida y Vuelta' : 'Sólo Ida' });

                    // Marcador ROJO (POI)
                    const marker = L.marker([coordDestino.lat, coordDestino.lon]).addTo(capasRutas);
                    marker._icon.classList.add("red-icon");
                    marker.bindPopup(`<b>${dTexto}</b><br>${kms} km`);

                    // Línea de ruta
                    L.geoJSON(ruta.geometry, { 
                        style: { color: '#005dac', weight: 4, opacity: 0.4, lineCap: 'round' } 
                    }).addTo(capasRutas);

                } catch (e) {
                    tabla.innerHTML += `<tr class="text-red-400"><td class="py-2">${dTexto}</td><td colspan="2">No encontrado</td></tr>`;
                }
            }
            
            systemStatus.innerText = "Cálculo finalizado con éxito";
            map.fitBounds(capasRutas.getBounds(), { padding: [50, 50] });

        } catch (error) {
            systemStatus.innerText = "Error: " + error.message;
        } finally {
            loader.classList.add('hidden');
        }
    }

    // --- FUNCIÓN EXPORTAR CSV ---
    function exportarCSV() {
        if (datosParaExportar.length === 0) return;
        
        const origen = inputOrigen.value.split(',')[0];
        let csvContent = "data:text/csv;charset=utf-8,Origen,Destino,KM,Tiempo,Tipo\n";
        
        datosParaExportar.forEach(r => {
            csvContent += `"${origen}","${r.Destino}","${r.KM}","${r.Tiempo}","${r.Tipo}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Rutas_FluidNav_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
